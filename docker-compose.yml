name: nofelet

services:
  nofelet-web:
    image: ghcr.io/maximtretjakov/nofelet-web:latest
    container_name: nofelet-web
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      - GOOSE_DRIVER=postgres
      - GOOSE_DBSTRING=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?sslmode=disable
    env_file:
      - .env
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal_net

  nofelet-signaling:
    image: ghcr.io/maximtretjakov/nofelet-signaling:latest
    container_name: nofelet-signaling
    restart: always
    ports:
      - "8443:8443"
    env_file:
      - .env
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal_net

  nofelet-chat:
    image: ghcr.io/maximtretjakov/nofelet-chat:latest
    container_name: nofelet-chat
    restart: always
    ports:
      - "8444:8444"
    env_file:
      - .env
    volumes:
      - /etc/letsencrypt:/etc/letsencrypt:ro
    deploy:
      resources:
        limits:
          memory: 150M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - internal_net

  coturn:
    image: coturn/coturn:latest
    container_name: coturn
    restart: unless-stopped
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 128M
    env_file:
      - .env
    volumes:
      - ./coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro

  postgres:
    image: postgres:15-alpine
    container_name: postgres_db
    restart: always
    command: >
      postgres
      -c 'shared_buffers=128MB'
      -c 'max_connections=5'
      -c 'work_mem=4MB'
      -c 'maintenance_work_mem=32MB'
    env_file:
      - .env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 10s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M # Жесткий лимит для Docker
    volumes:
      - pg_data:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      internal_net:
        ipv4_address: 172.21.0.10

  netdata:
    image: netdata/netdata:stable
    container_name: netdata
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped
    pid: host
    network_mode: host
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor=unconfined
    volumes:
      # Конфиги из Git
      - ./netdata/netdata.conf:/etc/netdata/netdata.conf:ro
      - ./netdata/go.d:/etc/netdata/go.d:ro
      - ./netdata/health.d:/etc/netdata/health.d:ro

      # Постоянные данные
      - netdata_lib:/var/lib/netdata
      - netdata_cache:/var/cache/netdata

      # Host
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /etc/hostname:/host/etc/hostname:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro

  fail2ban:
    image: lscr.io/linuxserver/fail2ban:latest
    container_name: fail2ban
    restart: unless-stopped
    network_mode: host
    deploy:
      resources:
        limits:
          memory: 128M
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./fail2ban:/etc/fail2ban
      - /var/lib/docker/containers:/var/lib/docker/containers:ro

networks:
  internal_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16

volumes:
  pg_data:
  netdata_config:
  netdata_lib:
  netdata_cache: